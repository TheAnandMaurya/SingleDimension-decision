<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event-Based Focus & Memory Prediction Engine</title>
    <style>
        :root {
            --color-bg-base: #0f172a;
            --color-bg-elevated: #1e293b;
            --color-bg-surface: #334155;
            --color-text-primary: #f1f5f9;
            --color-text-secondary: #cbd5e1;
            --color-text-muted: #94a3b8;
            --color-primary: #38bdf8;
            --color-primary-hover: #0ea5e9;
            --color-error: #ef4444;
            --color-success: #10b981;
            --color-warning: #f59e0b;
            --color-threat: #ef4444;
            --color-reward: #3b82f6;
            --font-family-base: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --radius-base: 8px;
            --space-8: 8px;
            --space-12: 12px;
            --space-16: 16px;
            --space-24: 24px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family-base);
            background: var(--color-bg-base);
            color: var(--color-text-primary);
            padding: var(--space-16);
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            font-size: 1.75rem;
            margin-bottom: var(--space-24);
            color: var(--color-primary);
            text-align: center;
        }

        .tabs {
            display: flex;
            gap: var(--space-8);
            margin-bottom: var(--space-24);
            flex-wrap: wrap;
        }

        .tab-btn {
            flex: 1;
            min-width: 120px;
            padding: var(--space-12) var(--space-16);
            background: var(--color-bg-elevated);
            color: var(--color-text-secondary);
            border: none;
            border-radius: var(--radius-base);
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .tab-btn:hover {
            background: var(--color-bg-surface);
            color: var(--color-text-primary);
        }

        .tab-btn.active {
            background: var(--color-primary);
            color: var(--color-bg-base);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .card {
            background: var(--color-bg-elevated);
            border-radius: var(--radius-base);
            padding: var(--space-24);
            margin-bottom: var(--space-16);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .card h2 {
            font-size: 1.25rem;
            margin-bottom: var(--space-16);
            color: var(--color-primary);
        }

        .card h3 {
            font-size: 1.1rem;
            margin-bottom: var(--space-12);
            color: var(--color-text-primary);
        }

        .input-group {
            display: flex;
            gap: var(--space-8);
            margin-bottom: var(--space-16);
            flex-wrap: wrap;
        }

        input[type="text"] {
            flex: 1;
            min-width: 200px;
            padding: var(--space-12);
            background: var(--color-bg-surface);
            border: 1px solid transparent;
            border-radius: var(--radius-base);
            color: var(--color-text-primary);
            font-size: 0.95rem;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--color-primary);
        }

        .btn {
            padding: var(--space-12) var(--space-16);
            background: var(--color-primary);
            color: var(--color-bg-base);
            border: none;
            border-radius: var(--radius-base);
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            transition: background 0.2s;
        }

        .btn:hover {
            background: var(--color-primary-hover);
        }

        .btn-delete {
            background: var(--color-error);
            padding: var(--space-8) var(--space-12);
            font-size: 0.85rem;
        }

        .btn-delete:hover {
            background: #dc2626;
        }

        .item-list {
            display: flex;
            flex-direction: column;
            gap: var(--space-8);
        }

        .item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--space-12);
            background: var(--color-bg-surface);
            border-radius: var(--radius-base);
        }

        .empty-state {
            text-align: center;
            color: var(--color-text-muted);
            padding: var(--space-24);
        }

        .two-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--space-16);
        }

        @media (max-width: 768px) {
            .two-panel {
                grid-template-columns: 1fr;
            }
        }

        .panel-threat {
            border-left: 3px solid var(--color-threat);
            padding-left: var(--space-12);
        }

        .panel-reward {
            border-left: 3px solid var(--color-reward);
            padding-left: var(--space-12);
        }

        .rating-card {
            background: var(--color-bg-elevated);
            border-radius: var(--radius-base);
            padding: var(--space-16);
            margin-bottom: var(--space-16);
            border: 2px solid var(--color-bg-surface);
        }

        .rating-card-header {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: var(--space-16);
            color: var(--color-primary);
            padding-bottom: var(--space-8);
            border-bottom: 1px solid var(--color-bg-surface);
        }

        .rating-section {
            margin-bottom: var(--space-24);
        }

        .rating-section h4 {
            font-size: 0.95rem;
            margin-bottom: var(--space-12);
            color: var(--color-text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .sliders-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: var(--space-16);
        }

        .slider-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .slider-label {
            font-size: 0.85rem;
            color: var(--color-text-secondary);
            margin-bottom: var(--space-8);
            text-align: center;
            min-height: 40px;
        }

        .slider-container {
            position: relative;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .slider-vertical {
            writing-mode: bt-lr;
            -webkit-appearance: slider-vertical;
            width: 8px;
            height: 180px;
            background: var(--color-bg-surface);
            border-radius: 4px;
            outline: none;
            cursor: pointer;
        }

        .slider-vertical::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            background: var(--color-primary);
            border-radius: 50%;
            cursor: pointer;
        }

        .slider-vertical::-moz-range-thumb {
            width: 20px;
            height: 20px;
            background: var(--color-primary);
            border-radius: 50%;
            cursor: pointer;
            border: none;
        }

        .slider-value {
            margin-top: var(--space-8);
            font-size: 1rem;
            font-weight: 600;
            color: var(--color-primary);
        }

        .info-box {
            background: var(--color-bg-surface);
            border-left: 4px solid var(--color-primary);
            padding: var(--space-16);
            border-radius: var(--radius-base);
            margin-bottom: var(--space-24);
        }

        .info-box h3 {
            margin-bottom: var(--space-12);
        }

        .info-box p {
            margin-bottom: var(--space-8);
            line-height: 1.8;
        }

        .regenerate-notice {
            background: var(--color-warning);
            color: var(--color-bg-base);
            padding: var(--space-16);
            border-radius: var(--radius-base);
            text-align: center;
            margin-top: var(--space-24);
        }

        .regenerate-notice .btn {
            margin-top: var(--space-12);
            background: var(--color-bg-base);
            color: var(--color-warning);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: var(--space-16);
            background: var(--color-bg-elevated);
        }

        th, td {
            padding: var(--space-12);
            text-align: left;
            border-bottom: 1px solid var(--color-bg-surface);
        }

        th {
            background: var(--color-bg-surface);
            color: var(--color-text-primary);
            font-weight: 600;
            font-size: 0.85rem;
        }

        td {
            font-size: 0.9rem;
        }

        .calculation-details {
            display: none;
            padding: var(--space-16);
            background: var(--color-bg-surface);
            border-radius: var(--radius-base);
            margin-top: var(--space-8);
        }

        .calculation-details.active {
            display: block;
        }

        .calc-group {
            margin-bottom: var(--space-16);
        }

        .calc-group h5 {
            color: var(--color-primary);
            margin-bottom: var(--space-8);
        }

        .calc-item {
            padding: 4px 0;
            font-size: 0.9rem;
            font-family: 'Courier New', monospace;
        }

        .btn-show-calc {
            background: var(--color-bg-surface);
            color: var(--color-primary);
            padding: 6px 12px;
            font-size: 0.8rem;
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .badge-focus {
            background: var(--color-primary);
            color: var(--color-bg-base);
        }

        .badge-memory {
            background: var(--color-success);
            color: var(--color-bg-base);
        }

        .threat-icon {
            color: var(--color-threat);
        }

        .reward-icon {
            color: var(--color-reward);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧠 Event-Based Focus & Memory Prediction Engine</h1>

        <div class="tabs">
            <button class="tab-btn active" data-tab="events">📅 Events</button>
            <button class="tab-btn" data-tab="criteria">🎯 Criteria</button>
            <button class="tab-btn" data-tab="ratings">⭐ Ratings</button>
            <button class="tab-btn" data-tab="results">📊 Results</button>
        </div>

        <div id="tab-events" class="tab-content active">
            <div class="card">
                <h2>Add Events</h2>
                <div class="input-group">
                    <input type="text" id="event-input" placeholder="Event Name">
                    <button class="btn" onclick="addEvent()">➕ Add Event</button>
                </div>
            </div>

            <div class="card">
                <h2>Add Dates</h2>
                <div class="input-group">
                    <input type="text" id="date-input" placeholder="Date Label">
                    <button class="btn" onclick="addDate()">➕ Add Date</button>
                </div>
            </div>

            <div class="card">
                <h2>Your Events & Dates</h2>
                <h3>Events:</h3>
                <div id="events-list" class="item-list"></div>
                <h3 style="margin-top: 24px;">Dates:</h3>
                <div id="dates-list" class="item-list"></div>
            </div>
        </div>

        <div id="tab-criteria" class="tab-content">
            <div class="card">
                <h2>P – Person Relevance</h2>
                <p style="color: var(--color-text-secondary); margin-bottom: 16px;">किसी व्यक्ति की प्रासंगिकता के मापदंड</p>
                <div class="input-group">
                    <input type="text" id="p-input" placeholder="P Criteria Name">
                    <button class="btn" onclick="addPCriteria()">➕ Add P Criteria</button>
                </div>
                <div id="p-criteria-list" class="item-list"></div>
            </div>

            <div class="card">
                <h2>T – Threat / Reward Intensity</h2>
                <p style="color: var(--color-text-secondary); margin-bottom: 16px;">खतरा और इनाम की तीव्रता</p>
                <div class="two-panel">
                    <div class="panel-threat">
                        <h3>🔴 Threat</h3>
                        <div class="input-group">
                            <input type="text" id="threat-input" placeholder="Threat Criteria">
                            <button class="btn btn-delete" onclick="addThreatCriteria()">➕</button>
                        </div>
                        <div id="threat-criteria-list" class="item-list"></div>
                    </div>
                    <div class="panel-reward">
                        <h3>🔵 Reward</h3>
                        <div class="input-group">
                            <input type="text" id="reward-input" placeholder="Reward Criteria">
                            <button class="btn" onclick="addRewardCriteria()">➕</button>
                        </div>
                        <div id="reward-criteria-list" class="item-list"></div>
                    </div>
                </div>
            </div>

            <div class="card">
                <h2>F – Future Relevance</h2>
                <p style="color: var(--color-text-secondary); margin-bottom: 16px;">भविष्य की प्रासंगिकता के मापदंड</p>
                <div class="input-group">
                    <input type="text" id="f-input" placeholder="F Criteria Name">
                    <button class="btn" onclick="addFCriteria()">➕ Add F Criteria</button>
                </div>
                <div id="f-criteria-list" class="item-list"></div>
            </div>
        </div>

        <div id="tab-ratings" class="tab-content">
            <div id="ratings-container"></div>
        </div>

        <div id="tab-results" class="tab-content">
            <div id="results-container"></div>
        </div>
    </div>

    <script>
        const state = {
            events: [],
            dates: [],
            pCriteria: [
                { id: 1, name: 'Authority Figure' },
                { id: 2, name: 'Emotional Closeness' },
                { id: 3, name: 'Resource Provider' },
                { id: 4, name: 'Mate Relevance' },
                { id: 5, name: 'Social Influence' }
            ],
            threatCriteria: [
                { id: 1, name: 'Status Loss Risk' },
                { id: 2, name: 'Social Rejection' },
                { id: 3, name: 'Resource Loss' },
                { id: 4, name: 'Incompetence Exposure' },
                { id: 5, name: 'Mate Loss Risk' }
            ],
            rewardCriteria: [
                { id: 1, name: 'Status Gain' },
                { id: 2, name: 'Belonging' },
                { id: 3, name: 'Mate Attraction' },
                { id: 4, name: 'Resource Gain' },
                { id: 5, name: 'Competence Validation' }
            ],
            fCriteria: [
                { id: 1, name: 'Repeat Probability' },
                { id: 2, name: 'Daily Life Impact' },
                { id: 3, name: 'Long Term Consequence' },
                { id: 4, name: 'Similar Situation Frequency' }
            ],
            ratings: {},
            resultsDirty: true
        };

        let nextEventId = 1;
        let nextDateId = 1;
        let nextPId = 6;
        let nextThreatId = 6;
        let nextRewardId = 6;
        let nextFId = 5;

        function addEvent() {
            const input = document.getElementById('event-input');
            const name = input.value.trim();
            if (!name) {
                alert('Please enter Event Name');
                return;
            }
            state.events.push({ id: nextEventId++, name });
            input.value = '';
            state.resultsDirty = true;
            renderEventsList();
            renderRatings();
        }

        function deleteEvent(id) {
            if (!confirm('Delete this event? All associated ratings will be lost.')) return;
            state.events = state.events.filter(e => e.id !== id);
            const keysToDelete = Object.keys(state.ratings).filter(k => k.startsWith(`r_${id}_`));
            keysToDelete.forEach(k => delete state.ratings[k]);
            state.resultsDirty = true;
            renderEventsList();
            renderRatings();
        }

        function addDate() {
            const input = document.getElementById('date-input');
            const name = input.value.trim();
            if (!name) {
                alert('Please enter Date label');
                return;
            }
            state.dates.push({ id: nextDateId++, name });
            input.value = '';
            state.resultsDirty = true;
            renderDatesList();
            renderRatings();
        }

        function deleteDate(id) {
            if (!confirm('Delete this date? All associated ratings will be lost.')) return;
            state.dates = state.dates.filter(d => d.id !== id);
            const keysToDelete = Object.keys(state.ratings).filter(k => {
                const parts = k.split('_');
                return parts.length > 2 && parts[2] == id;
            });
            keysToDelete.forEach(k => delete state.ratings[k]);
            state.resultsDirty = true;
            renderDatesList();
            renderRatings();
        }

        function addPCriteria() {
            const input = document.getElementById('p-input');
            const name = input.value.trim();
            if (!name) {
                alert('Please enter P Criteria name');
                return;
            }
            state.pCriteria.push({ id: nextPId++, name });
            input.value = '';
            state.resultsDirty = true;
            renderPCriteriaList();
            renderRatings();
        }

        function deletePCriteria(id) {
            if (!confirm('Delete this P criteria? All associated ratings will be lost.')) return;
            state.pCriteria = state.pCriteria.filter(c => c.id !== id);
            const keysToDelete = Object.keys(state.ratings).filter(k => 
                k.includes(`_P_${id}`) || k.includes(`_P_weight_${id}`)
            );
            keysToDelete.forEach(k => delete state.ratings[k]);
            state.resultsDirty = true;
            renderPCriteriaList();
            renderRatings();
        }

        function addThreatCriteria() {
            const input = document.getElementById('threat-input');
            const name = input.value.trim();
            if (!name) {
                alert('Please enter Threat Criteria name');
                return;
            }
            state.threatCriteria.push({ id: nextThreatId++, name });
            input.value = '';
            state.resultsDirty = true;
            renderThreatCriteriaList();
            renderRatings();
        }

        function deleteThreatCriteria(id) {
            if (!confirm('Delete this Threat criteria? All associated ratings will be lost.')) return;
            state.threatCriteria = state.threatCriteria.filter(c => c.id !== id);
            const keysToDelete = Object.keys(state.ratings).filter(k => 
                k.includes(`_T_threat_${id}`) || k.includes(`_T_threat_weight_${id}`)
            );
            keysToDelete.forEach(k => delete state.ratings[k]);
            state.resultsDirty = true;
            renderThreatCriteriaList();
            renderRatings();
        }

        function addRewardCriteria() {
            const input = document.getElementById('reward-input');
            const name = input.value.trim();
            if (!name) {
                alert('Please enter Reward Criteria name');
                return;
            }
            state.rewardCriteria.push({ id: nextRewardId++, name });
            input.value = '';
            state.resultsDirty = true;
            renderRewardCriteriaList();
            renderRatings();
        }

        function deleteRewardCriteria(id) {
            if (!confirm('Delete this Reward criteria? All associated ratings will be lost.')) return;
            state.rewardCriteria = state.rewardCriteria.filter(c => c.id !== id);
            const keysToDelete = Object.keys(state.ratings).filter(k => 
                k.includes(`_T_reward_${id}`) || k.includes(`_T_reward_weight_${id}`)
            );
            keysToDelete.forEach(k => delete state.ratings[k]);
            state.resultsDirty = true;
            renderRewardCriteriaList();
            renderRatings();
        }

        function addFCriteria() {
            const input = document.getElementById('f-input');
            const name = input.value.trim();
            if (!name) {
                alert('Please enter F Criteria name');
                return;
            }
            state.fCriteria.push({ id: nextFId++, name });
            input.value = '';
            state.resultsDirty = true;
            renderFCriteriaList();
            renderRatings();
        }

        function deleteFCriteria(id) {
            if (!confirm('Delete this F criteria? All associated ratings will be lost.')) return;
            state.fCriteria = state.fCriteria.filter(c => c.id !== id);
            const keysToDelete = Object.keys(state.ratings).filter(k => 
                k.includes(`_F_${id}`) || k.includes(`_F_weight_${id}`)
            );
            keysToDelete.forEach(k => delete state.ratings[k]);
            state.resultsDirty = true;
            renderFCriteriaList();
            renderRatings();
        }

        function renderEventsList() {
            const container = document.getElementById('events-list');
            if (state.events.length === 0) {
                container.innerHTML = '<div class="empty-state">No events added yet</div>';
                return;
            }
            container.innerHTML = state.events.map(e => `
                <div class="item">
                    <span>${e.name}</span>
                    <button class="btn btn-delete" onclick="deleteEvent(${e.id})">🗑️ Delete</button>
                </div>
            `).join('');
        }

        function renderDatesList() {
            const container = document.getElementById('dates-list');
            if (state.dates.length === 0) {
                container.innerHTML = '<div class="empty-state">No dates added yet</div>';
                return;
            }
            container.innerHTML = state.dates.map(d => `
                <div class="item">
                    <span>${d.name}</span>
                    <button class="btn btn-delete" onclick="deleteDate(${d.id})">🗑️ Delete</button>
                </div>
            `).join('');
        }

        function renderPCriteriaList() {
            const container = document.getElementById('p-criteria-list');
            if (state.pCriteria.length === 0) {
                container.innerHTML = '<div class="empty-state">No P criteria</div>';
                return;
            }
            container.innerHTML = state.pCriteria.map(c => `
                <div class="item">
                    <span>${c.name}</span>
                    <button class="btn btn-delete" onclick="deletePCriteria(${c.id})">🗑️ Delete</button>
                </div>
            `).join('');
        }

        function renderThreatCriteriaList() {
            const container = document.getElementById('threat-criteria-list');
            if (state.threatCriteria.length === 0) {
                container.innerHTML = '<div class="empty-state">No Threat criteria</div>';
                return;
            }
            container.innerHTML = state.threatCriteria.map(c => `
                <div class="item">
                    <span>${c.name}</span>
                    <button class="btn btn-delete" onclick="deleteThreatCriteria(${c.id})">🗑️ Delete</button>
                </div>
            `).join('');
        }

        function renderRewardCriteriaList() {
            const container = document.getElementById('reward-criteria-list');
            if (state.rewardCriteria.length === 0) {
                container.innerHTML = '<div class="empty-state">No Reward criteria</div>';
                return;
            }
            container.innerHTML = state.rewardCriteria.map(c => `
                <div class="item">
                    <span>${c.name}</span>
                    <button class="btn btn-delete" onclick="deleteRewardCriteria(${c.id})">🗑️ Delete</button>
                </div>
            `).join('');
        }

        function renderFCriteriaList() {
            const container = document.getElementById('f-criteria-list');
            if (state.fCriteria.length === 0) {
                container.innerHTML = '<div class="empty-state">No F criteria</div>';
                return;
            }
            container.innerHTML = state.fCriteria.map(c => `
                <div class="item">
                    <span>${c.name}</span>
                    <button class="btn btn-delete" onclick="deleteFCriteria(${c.id})">🗑️ Delete</button>
                </div>
            `).join('');
        }

        function updateRating(key, value) {
            state.ratings[key] = parseFloat(value);
            document.getElementById(`val-${key}`).textContent = parseFloat(value).toFixed(1);
            state.resultsDirty = true;
        }

        function createSlider(key, label) {
            const value = state.ratings[key] || 5.0;
            return `
                <div class="slider-wrapper">
                    <div class="slider-label">${label}</div>
                    <div class="slider-container">
                        <input type="range" min="0" max="10" step="0.5" value="${value}" 
                            class="slider-vertical" 
                            oninput="updateRating('${key}', this.value)">
                    </div>
                    <div class="slider-value" id="val-${key}">${value.toFixed(1)}</div>
                </div>
            `;
        }

        function renderRatings() {
            const container = document.getElementById('ratings-container');
            
            if (state.events.length === 0 || state.dates.length === 0) {
                container.innerHTML = `
                    <div class="card">
                        <div class="empty-state">Add events and dates first to start rating</div>
                    </div>
                `;
                return;
            }

            let html = '';
            
            for (const event of state.events) {
                for (const date of state.dates) {
                    html += `
                        <div class="rating-card">
                            <div class="rating-card-header">${event.name} | ${date.name}</div>
                            
                            <div class="rating-section">
                                <h4>STEP 1: Criteria Weights – How important is each factor?</h4>
                                <div class="sliders-grid">
                    `;

                    for (const pc of state.pCriteria) {
                        const key = `r_${event.id}_${date.id}_P_weight_${pc.id}`;
                        html += createSlider(key, `P Weight: ${pc.name}`);
                    }

                    for (const tc of state.threatCriteria) {
                        const key = `r_${event.id}_${date.id}_T_threat_weight_${tc.id}`;
                        html += createSlider(key, `🔴 T Weight: ${tc.name}`);
                    }

                    for (const rc of state.rewardCriteria) {
                        const key = `r_${event.id}_${date.id}_T_reward_weight_${rc.id}`;
                        html += createSlider(key, `🔵 T Weight: ${rc.name}`);
                    }

                    for (const fc of state.fCriteria) {
                        const key = `r_${event.id}_${date.id}_F_weight_${fc.id}`;
                        html += createSlider(key, `F Weight: ${fc.name}`);
                    }

                    html += createSlider(`r_${event.id}_${date.id}_D_weight`, 'D Weight: Time Delay');
                    html += createSlider(`r_${event.id}_${date.id}_R_weight`, 'R Weight: Recall Freq');
                    html += createSlider(`r_${event.id}_${date.id}_S_weight`, 'S Weight: Self-Relevance');

                    html += `
                                </div>
                            </div>

                            <div class="rating-section">
                                <h4>STEP 2: Ratings</h4>
                                
                                <h4 style="margin-top: 16px;">P – Person Relevance Ratings</h4>
                                <div class="sliders-grid">
                    `;

                    for (const pc of state.pCriteria) {
                        const key = `r_${event.id}_${date.id}_P_${pc.id}`;
                        html += createSlider(key, pc.name);
                    }

                    html += `
                                </div>
                                
                                <h4 style="margin-top: 16px;">T – Threat / Reward Ratings</h4>
                                <div class="sliders-grid">
                    `;

                    for (const tc of state.threatCriteria) {
                        const key = `r_${event.id}_${date.id}_T_threat_${tc.id}`;
                        html += createSlider(key, `🔴 ${tc.name}`);
                    }

                    for (const rc of state.rewardCriteria) {
                        const key = `r_${event.id}_${date.id}_T_reward_${rc.id}`;
                        html += createSlider(key, `🔵 ${rc.name}`);
                    }

                    html += `
                                </div>
                                
                                <h4 style="margin-top: 16px;">F – Future Relevance Ratings</h4>
                                <div class="sliders-grid">
                    `;

                    for (const fc of state.fCriteria) {
                        const key = `r_${event.id}_${date.id}_F_${fc.id}`;
                        html += createSlider(key, fc.name);
                    }

                    html += `
                                </div>
                                
                                <h4 style="margin-top: 16px;">D, R, S Ratings</h4>
                                <div class="sliders-grid">
                    `;

                    html += createSlider(`r_${event.id}_${date.id}_D`, 'D: Recency (10=recent, 0=old)');
                    html += createSlider(`r_${event.id}_${date.id}_R`, 'R: Recall Frequency');
                    html += createSlider(`r_${event.id}_${date.id}_S`, 'S: Self-Relevance');

                    html += `
                                </div>
                            </div>
                        </div>
                    `;
                }
            }

            if (state.events.length > 0 && state.dates.length > 0) {
                html += `
                    <div class="regenerate-notice">
                        <strong>Ratings or criteria have changed. Click to regenerate results.</strong>
                        <button class="btn" onclick="regenerateResults()">🔄 Regenerate Results</button>
                    </div>
                `;
            }

            container.innerHTML = html;
        }

        function regenerateResults() {
            calculateResults();
            state.resultsDirty = false;
            switchTab('results');
        }

        function calculateResults() {
            const container = document.getElementById('results-container');
            
            if (state.events.length === 0 || state.dates.length === 0) {
                container.innerHTML = `
                    <div class="card">
                        <div class="empty-state">Add events, dates, and ratings to see results.</div>
                    </div>
                `;
                return;
            }

            let html = `
                <div class="info-box">
                    <h3>📐 New Calculation Formulas</h3>
                    <p><strong>Step 1:</strong> Focus_raw = Σ(P Rating × P Weight) + Σ(T Rating × T Weight) + Σ(F Rating × F Weight)</p>
                    <p><strong>Step 2:</strong> Focus_rel% = (Focus_raw / (Σ(10 × P Weight) + Σ(10 × T Weight) + Σ(10 × F Weight))) × 100</p>
                    <p><strong>Step 3:</strong> Focus_abs% = (Focus_raw / (100 × Total Criteria Count)) × 100</p>
                    <p><strong>Step 4:</strong> Normalize D,R,S weights: Wd' = D Weight / (D+R+S Weights), similarly Wr', Ws'</p>
                    <p><strong>Step 5:</strong> Retention = (D Rating/10 × Wd') + (R Rating/10 × Wr') + (S Rating/10 × Ws')</p>
                    <p><strong>Step 6:</strong> Memory_rel% = Focus_rel% × Retention, Memory_abs% = Focus_abs% × Retention</p>
                    <p style="margin-top: 12px;"><strong>D</strong> = Time Delay (10=recent, 0=old) | <strong>R</strong> = Recall Frequency | <strong>S</strong> = Self-Relevance</p>
                </div>

                <div class="card">
                    <h2>Results Table</h2>
                    <table>
                        <thead>
                            <tr>
                                <th>Event</th>
                                <th>Date</th>
                                <th>Focus Raw</th>
                                <th>Focus Rel %</th>
                                <th>Focus Abs %</th>
                                <th>Retention</th>
                                <th>Memory Rel %</th>
                                <th>Memory Abs %</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
            `;

            let resultIndex = 0;
            for (const event of state.events) {
                for (const date of state.dates) {
                    let weightedP = 0;
                    let pDetails = [];
                    for (const pc of state.pCriteria) {
                        const rating = state.ratings[`r_${event.id}_${date.id}_P_${pc.id}`] || 5;
                        const weight = state.ratings[`r_${event.id}_${date.id}_P_weight_${pc.id}`] || 5;
                        const product = rating * weight;
                        weightedP += product;
                        pDetails.push({ name: pc.name, rating, weight, product });
                    }

                    let weightedT = 0;
                    let threatDetails = [];
                    let rewardDetails = [];
                    for (const tc of state.threatCriteria) {
                        const rating = state.ratings[`r_${event.id}_${date.id}_T_threat_${tc.id}`] || 5;
                        const weight = state.ratings[`r_${event.id}_${date.id}_T_threat_weight_${tc.id}`] || 5;
                        const product = rating * weight;
                        weightedT += product;
                        threatDetails.push({ name: tc.name, rating, weight, product });
                    }
                    for (const rc of state.rewardCriteria) {
                        const rating = state.ratings[`r_${event.id}_${date.id}_T_reward_${rc.id}`] || 5;
                        const weight = state.ratings[`r_${event.id}_${date.id}_T_reward_weight_${rc.id}`] || 5;
                        const product = rating * weight;
                        weightedT += product;
                        rewardDetails.push({ name: rc.name, rating, weight, product });
                    }

                    let weightedF = 0;
                    let fDetails = [];
                    for (const fc of state.fCriteria) {
                        const rating = state.ratings[`r_${event.id}_${date.id}_F_${fc.id}`] || 5;
                        const weight = state.ratings[`r_${event.id}_${date.id}_F_weight_${fc.id}`] || 5;
                        const product = rating * weight;
                        weightedF += product;
                        fDetails.push({ name: fc.name, rating, weight, product });
                    }

                    const Dval = state.ratings[`r_${event.id}_${date.id}_D`] || 5;
                    const Dweight = state.ratings[`r_${event.id}_${date.id}_D_weight`] || 5;
                    const weightedD = Dval * Dweight;

                    const Rval = state.ratings[`r_${event.id}_${date.id}_R`] || 5;
                    const Rweight = state.ratings[`r_${event.id}_${date.id}_R_weight`] || 5;
                    const weightedR = Rval * Rweight;

                    const Sval = state.ratings[`r_${event.id}_${date.id}_S`] || 5;
                    const Sweight = state.ratings[`r_${event.id}_${date.id}_S_weight`] || 5;
                    const weightedS = Sval * Sweight;

                    const focusRaw = weightedP + weightedT + weightedF;

                    const totalCriteriaCount = state.pCriteria.length + state.threatCriteria.length + state.rewardCriteria.length + state.fCriteria.length;

                    let maxWeightedSum = 0;
                    for (const pc of state.pCriteria) {
                        const weight = state.ratings[`r_${event.id}_${date.id}_P_weight_${pc.id}`] || 5;
                        maxWeightedSum += 10 * weight;
                    }
                    for (const tc of state.threatCriteria) {
                        const weight = state.ratings[`r_${event.id}_${date.id}_T_threat_weight_${tc.id}`] || 5;
                        maxWeightedSum += 10 * weight;
                    }
                    for (const rc of state.rewardCriteria) {
                        const weight = state.ratings[`r_${event.id}_${date.id}_T_reward_weight_${rc.id}`] || 5;
                        maxWeightedSum += 10 * weight;
                    }
                    for (const fc of state.fCriteria) {
                        const weight = state.ratings[`r_${event.id}_${date.id}_F_weight_${fc.id}`] || 5;
                        maxWeightedSum += 10 * weight;
                    }

                    const focusRelPercent = maxWeightedSum > 0 ? (focusRaw / maxWeightedSum) * 100 : 0;
                    const focusAbsPercent = totalCriteriaCount > 0 ? (focusRaw / (100 * totalCriteriaCount)) * 100 : 0;

                    const wSum = Dweight + Rweight + Sweight;
                    const wdNorm = wSum > 0 ? Dweight / wSum : 0.333;
                    const wrNorm = wSum > 0 ? Rweight / wSum : 0.333;
                    const wsNorm = wSum > 0 ? Sweight / wSum : 0.333;

                    const retention = (Dval / 10 * wdNorm) + (Rval / 10 * wrNorm) + (Sval / 10 * wsNorm);

                    let memoryRelPercent = focusRelPercent * retention;
                    let memoryAbsPercent = focusAbsPercent * retention;

                    memoryRelPercent = Math.min(memoryRelPercent, focusRelPercent);
                    memoryAbsPercent = Math.min(memoryAbsPercent, focusAbsPercent);

                    html += `
                        <tr>
                            <td>${event.name}</td>
                            <td>${date.name}</td>
                            <td>${focusRaw.toFixed(2)}</td>
                            <td><span class="badge badge-focus">${focusRelPercent.toFixed(1)}%</span></td>
                            <td>${focusAbsPercent.toFixed(1)}%</td>
                            <td>${retention.toFixed(3)}</td>
                            <td><span class="badge badge-memory">${memoryRelPercent.toFixed(1)}%</span></td>
                            <td>${memoryAbsPercent.toFixed(1)}%</td>
                            <td>
                                <button class="btn btn-show-calc" onclick="toggleCalc(${resultIndex})">📊 Show Calc</button>
                            </td>
                        </tr>
                        <tr>
                            <td colspan="13" style="padding: 0;">
                                <div id="calc-${resultIndex}" class="calculation-details">
                                    <div class="calc-group">
                                        <h5>P – Person Relevance Breakdown</h5>
                                        ${pDetails.map(d => `<div class="calc-item">${d.name}: ${d.rating.toFixed(1)} × ${d.weight.toFixed(1)} = ${d.product.toFixed(2)}</div>`).join('')}
                                        <div class="calc-item" style="font-weight: bold; margin-top: 8px;">Total Weighted P = ${weightedP.toFixed(2)}</div>
                                    </div>

                                    <div class="calc-group">
                                        <h5>T – Threat / Reward Breakdown</h5>
                                        <div style="margin-bottom: 8px;"><strong class="threat-icon">🔴 Threat:</strong></div>
                                        ${threatDetails.map(d => `<div class="calc-item">${d.name}: ${d.rating.toFixed(1)} × ${d.weight.toFixed(1)} = ${d.product.toFixed(2)}</div>`).join('')}
                                        <div style="margin-top: 12px; margin-bottom: 8px;"><strong class="reward-icon">🔵 Reward:</strong></div>
                                        ${rewardDetails.map(d => `<div class="calc-item">${d.name}: ${d.rating.toFixed(1)} × ${d.weight.toFixed(1)} = ${d.product.toFixed(2)}</div>`).join('')}
                                        <div class="calc-item" style="font-weight: bold; margin-top: 8px;">Total Weighted T = ${weightedT.toFixed(2)}</div>
                                    </div>

                                    <div class="calc-group">
                                        <h5>F – Future Relevance Breakdown</h5>
                                        ${fDetails.map(d => `<div class="calc-item">${d.name}: ${d.rating.toFixed(1)} × ${d.weight.toFixed(1)} = ${d.product.toFixed(2)}</div>`).join('')}
                                        <div class="calc-item" style="font-weight: bold; margin-top: 8px;">Total Weighted F = ${weightedF.toFixed(2)}</div>
                                    </div>

                                    <div class="calc-group">
                                        <h5>D, R, S Details</h5>
                                        <div class="calc-item">D (Time Delay): ${Dval.toFixed(1)} × ${Dweight.toFixed(1)} = ${weightedD.toFixed(2)}</div>
                                        <div class="calc-item">R (Recall Frequency): ${Rval.toFixed(1)} × ${Rweight.toFixed(1)} = ${weightedR.toFixed(2)}</div>
                                        <div class="calc-item">S (Self-Relevance): ${Sval.toFixed(1)} × ${Sweight.toFixed(1)} = ${weightedS.toFixed(2)}</div>
                                    </div>

                                    <div class="calc-group">
                                        <h5>Step 1: Focus Raw</h5>
                                        <div class="calc-item">Focus_raw = ${weightedP.toFixed(2)} + ${weightedT.toFixed(2)} + ${weightedF.toFixed(2)} = ${focusRaw.toFixed(2)}</div>
                                    </div>

                                    <div class="calc-group">
                                        <h5>Step 2: Focus Relative %</h5>
                                        <div class="calc-item">Max Weighted Sum = ${maxWeightedSum.toFixed(2)}</div>
                                        <div class="calc-item">Focus_rel% = (${focusRaw.toFixed(2)} / ${maxWeightedSum.toFixed(2)}) × 100 = ${focusRelPercent.toFixed(2)}%</div>
                                    </div>

                                    <div class="calc-group">
                                        <h5>Step 3: Focus Absolute %</h5>
                                        <div class="calc-item">Total Criteria = ${totalCriteriaCount}</div>
                                        <div class="calc-item">Focus_abs% = (${focusRaw.toFixed(2)} / (100 × ${totalCriteriaCount})) × 100 = ${focusAbsPercent.toFixed(2)}%</div>
                                    </div>

                                    <div class="calc-group">
                                        <h5>Step 4: Normalized D,R,S Weights</h5>
                                        <div class="calc-item">Weight Sum = ${Dweight.toFixed(1)} + ${Rweight.toFixed(1)} + ${Sweight.toFixed(1)} = ${wSum.toFixed(2)}</div>
                                        <div class="calc-item">Wd' = ${Dweight.toFixed(1)} / ${wSum.toFixed(2)} = ${wdNorm.toFixed(3)}</div>
                                        <div class="calc-item">Wr' = ${Rweight.toFixed(1)} / ${wSum.toFixed(2)} = ${wrNorm.toFixed(3)}</div>
                                        <div class="calc-item">Ws' = ${Sweight.toFixed(1)} / ${wSum.toFixed(2)} = ${wsNorm.toFixed(3)}</div>
                                    </div>

                                    <div class="calc-group">
                                        <h5>Step 5: Retention Factor</h5>
                                        <div class="calc-item">Retention = (${Dval.toFixed(1)}/10 × ${wdNorm.toFixed(3)}) + (${Rval.toFixed(1)}/10 × ${wrNorm.toFixed(3)}) + (${Sval.toFixed(1)}/10 × ${wsNorm.toFixed(3)})</div>
                                        <div class="calc-item">Retention = ${retention.toFixed(3)}</div>
                                    </div>

                                    <div class="calc-group">
                                        <h5>Step 6: Memory Scores</h5>
                                        <div class="calc-item">Memory_rel% = ${focusRelPercent.toFixed(2)}% × ${retention.toFixed(3)} = ${memoryRelPercent.toFixed(2)}%</div>
                                        <div class="calc-item">Memory_abs% = ${focusAbsPercent.toFixed(2)}% × ${retention.toFixed(3)} = ${memoryAbsPercent.toFixed(2)}%</div>
                                    </div>
                                </div>
                            </td>
                        </tr>
                    `;
                    resultIndex++;
                }
            }

            html += `
                        </tbody>
                    </table>
                </div>
            `;

            container.innerHTML = html;
        }

        function toggleCalc(index) {
            const elem = document.getElementById(`calc-${index}`);
            elem.classList.toggle('active');
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });

            document.querySelector(`[data-tab="${tabName}"]`).classList.add('active');
            document.getElementById(`tab-${tabName}`).classList.add('active');

            if (tabName === 'results' && state.resultsDirty) {
                calculateResults();
                state.resultsDirty = false;
            }
        }

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                switchTab(btn.dataset.tab);
            });
        });

        renderEventsList();
        renderDatesList();
        renderPCriteriaList();
        renderThreatCriteriaList();
        renderRewardCriteriaList();
        renderFCriteriaList();
        renderRatings();
    </script>
</body>
</html>
